name: CI/CD Pipeline

on:
  push:
    branches: [master, dev] # Trigger on pushed to master or dev
  pull_request:
    branches: [master, dev]

jobs:
  quality:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Backend Analysis (Lint & Build)
        run: |
          cd backend-express
          bun run check
          bun run build
        
      - name: Frontend Analysis (Lint)
        run: |
          cd frontend
          bun run lint

  deploy:
    name: Deploy to Production
    needs: quality
    if: (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev') && github.event_name == 'push'
    runs-on: ubuntu-latest
    continue-on-error: false
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Step 1: Deploy Express Backend + React Frontend to Fly.io
      # This uses the Dockerfile in the root which handles both builds
      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@v1
      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      # Step 2: Deploy Shopify Extensions (Theme App Extension, etc)
      # This updates the extensions in the Shopify Partners Dashboard
      - name: Deploy Extensions to Shopify
        run: bun run deploy -- --force
        env:
          SHOPIFY_CLI_PARTNERS_TOKEN: ${{ secrets.SHOPIFY_CLI_PARTNERS_TOKEN }}
          SHOPIFY_FLAG_FORCE: '1'
